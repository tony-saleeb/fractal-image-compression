name: Push Shorebird Patch (Android)

on:
  workflow_dispatch:

jobs:
  patch_android:
    name: Push Shorebird Patch to Android Devices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: 🐦 Push Shorebird Patch
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          cd frontend
          shorebird patch android --force --release-version=latest
