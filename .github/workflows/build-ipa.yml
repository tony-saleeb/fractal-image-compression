name: Build iOS IPA

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  push:
    branches:
      - main

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Create Dummy Web Assets
        run: |
          mkdir -p build
          echo "<!DOCTYPE html><html><body></body></html>" > build/index.html

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios/App
          # We build an unsigned app since we don't have Apple Certificates in the repo
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into IPA
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          # Move the compiled .app into the Payload folder
          mv App.app Payload/
          # Zip it up as an .ipa file
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-unsigned-ipa
          path: ios/App/build/Build/Products/Release-iphoneos/app.ipa
