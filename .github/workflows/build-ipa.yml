name: Build Shorebird iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_ios:
    name: Build Shorebird iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Update CocoaPods
        run: |
          cd frontend/ios
          pod repo update

      - name: Fix Deployment Target
        run: |
          cd frontend/ios
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' Runner.xcodeproj/project.pbxproj

      - name: Shorebird Release iOS (Unsigned)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          cd frontend
          shorebird release ios --no-codesign

      - name: Package into IPA
        run: |
          cd frontend
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          cd $(dirname "$APP_PATH")
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-shorebird-ipa
          path: frontend/**/app.ipa
