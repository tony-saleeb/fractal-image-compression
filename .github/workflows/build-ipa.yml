name: Build Flutter iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Update CocoaPods
        run: |
          cd frontend/ios
          pod repo update

      - name: Fix Deployment Target
        run: |
          cd frontend/ios
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' Runner.xcodeproj/project.pbxproj

      - name: Build iOS App (Unsigned)
        run: |
          cd frontend
          flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          cd frontend/build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-flutter-ipa
          path: frontend/build/ios/iphoneos/app.ipa
